name: PromptTrail Public Preview

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy_public_preview:
    runs-on: ubuntu-latest
    name: Build and Deploy Public Preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build PromptTrail
        run: pnpm --filter prompt-trail build

      - name: Deploy prebuilt PromptTrail artifact to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_FLOWER_0FF1F6100 }}
          action: upload
          app_location: apps/prompt-trail/dist
          api_location: ''
          skip_app_build: true
