# Deploy PromptTrail to GitHub Pages as the shared codex/** development preview.
name: PromptTrail Development Preview

on:
  # Runs on pushes targeting codex/** development branches.
  push:
    branches:
      - 'codex/**'

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Pages hosts one shared development preview, so newer codex/** deployments replace older ones.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy_development_preview:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build PromptTrail
        run: pnpm --filter prompt-trail build
        env:
          GITHUB_PAGES: 'true'

      - name: Add GitHub Pages SPA fallback
        run: cp apps/prompt-trail/dist/index.html apps/prompt-trail/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/prompt-trail/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
